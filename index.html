<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>微电子学术会议截止日期</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2a37;
      --muted: #5b6b7a;
      --line: #e4eaf2;
      --accent: #0f62fe;
      --danger: #d7263d;
      --ok: #2e7d32;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .sub {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .table-wrap {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: auto;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.05);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
    }

    th, td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-size: 14px;
      vertical-align: top;
    }

    th:nth-child(7),
    td:nth-child(7) {
      min-width: 130px;
      white-space: nowrap;
    }

    th {
      background: #f0f4fa;
      font-weight: 600;
      white-space: nowrap;
    }

    tbody tr:hover {
      background: #fafcff;
    }

    a.conf-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    a.conf-link:hover {
      text-decoration: underline;
    }

    .deadline-expired {
      color: var(--danger);
      font-weight: 600;
    }

    .deadline-upcoming {
      color: var(--ok);
      font-weight: 600;
    }

    .rank-emphasis {
      font-weight: 700;
    }

    footer {
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>微电子领域学术会议截止日期</h1>
    <p class="sub">默认按投稿截止日期升序排列；倒计时会随当前时间自动更新。</p>

    <section class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>会议名称（简称 - 全称）</th>
            <th>地点</th>
            <th>类别</th>
            <th>投稿截止日期</th>
            <th>倒计时</th>
            <th>会议日期</th>
            <th>等级</th>
          </tr>
        </thead>
        <tbody id="conference-body"></tbody>
      </table>
    </section>

    <footer>
      数据可在 <code>index.html</code> 的 <code>conferences</code> 数组中手动维护（当前为 2026 年信息，未公布项标注为 TBD）。
    </footer>
    <footer>
     <p>时间与地点仅供参考，以官方最新公布为准（注意区分abstract deadline和submission deadline）。</p>
    </footer>
  </main>

  <script>

      {

        location: "Athens, Greece",

      {

        full: "International Conference on Computer-Aided Design",
        url: "https://iccad.com/",
        location: "San Jose, CA, US",
        category: "EDA / CAD",
        submissionDeadline: "2026-04-14",
        conferenceDate: "2026-11-08",
        rank: "CCF B"
      },
      {
        abbr: "IEDM",
        full: "IEEE International Electron Devices Meeting",
        url: "https://ieee-iedm.org/future-conferences",
        location: "Hilton Union Square, San Francisco, CA, US",
        category: "器件 / 工艺",
        submissionDeadline: "TBD",
        conferenceDate: "2026-12-12 ~ 2026-12-16",
        rank: "领域顶会"
      }
    ];

    function toDateOnly(dateString) {
      if (!dateString || dateString === "TBD") {
        return null;
      }
      const date = new Date(dateString + "T23:59:59");
      if (Number.isNaN(date.getTime())) {
        return null;
      }
      return date;
    }

    function formatDate(dateString) {
      if (!dateString || dateString === "TBD") {
        return "TBD";
      }
      const [y, m, d] = dateString.split("-");
      if (!y || !m || !d) {
        return "TBD";
      }
      return y + "-" + m + "-" + d;
    }

    function getCountdown(deadlineString) {
      if (!deadlineString || deadlineString === "TBD") {
        return { text: "待发布", expired: false };
      }

      const now = new Date();
      const deadline = toDateOnly(deadlineString);
      if (!deadline) {
        return { text: "待发布", expired: false };
      }
      const diffMs = deadline - now;
      const dayMs = 24 * 60 * 60 * 1000;

      if (diffMs < 0) {
        return { text: "已截止", expired: true };
      }

      const days = Math.floor(diffMs / dayMs);
      const hours = Math.floor((diffMs % dayMs) / (60 * 60 * 1000));
      return { text: days + " 天 " + hours + " 小时", expired: false };
    }

    function formatRank(rankText) {
      if (rankText === "CCF A" || rankText === "CCF B") {
        const level = rankText.slice(-1);
        return 'CCF <span class="rank-emphasis">' + level + "</span>";
      }
      if (rankText.includes("顶会")) {
        return rankText.replace("顶会", '<span class="rank-emphasis">顶会</span>');
      }
      return rankText;
    }

    function renderTable() {
      const tbody = document.getElementById("conference-body");
      const sorted = conferences.slice().sort((a, b) => {
        const aDate = toDateOnly(a.submissionDeadline);
        const bDate = toDateOnly(b.submissionDeadline);
        if (aDate && bDate) {
          return aDate - bDate;
        }
        if (aDate && !bDate) {
          return -1;
        }
        if (!aDate && bDate) {
          return 1;
        }
        return a.abbr.localeCompare(b.abbr);
      });

      tbody.innerHTML = "";

      sorted.forEach((conf) => {
        const countdown = getCountdown(conf.submissionDeadline);
        const tr = document.createElement("tr");
        tr.innerHTML =
          '<td><a class="conf-link" href="' + conf.url + '" target="_blank" rel="noopener noreferrer">' +
          conf.abbr + " - " + conf.full + "</a></td>" +
          "<td>" + conf.location + "</td>" +
          "<td>" + conf.category + "</td>" +
          "<td>" + formatDate(conf.submissionDeadline) + "</td>" +
          '<td class="' + (countdown.expired ? "deadline-expired" : "deadline-upcoming") + '">' + countdown.text + "</td>" +
          "<td>" + conf.conferenceDate + "</td>" +
          "<td>" + formatRank(conf.rank) + "</td>";
        tbody.appendChild(tr);
      });
    }

    renderTable();
    setInterval(renderTable, 60 * 1000);
  </script>
</body>
</html>
